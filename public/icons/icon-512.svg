  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Banana -->
  <path d="M380 180c-15-70-100-95-170-65s-120 110-105 190c10 55 55 70 95 55s135-80 180-180z" 
        fill="url(#banana)" 
